version: '3.9'

services:

  api:
    build: .
    command: uvicorn backend.fastapi_app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres

  worker:
    build: .
    command: python backend/flask_worker/worker.py
    env_file:
      - .env

  dashboard:
    build: .
    command: streamlit run dashboard/app.py
    ports:
      - "8501:8501"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: scanner
      POSTGRES_PASSWORD: scanner
      POSTGRES_DB: vuln_scanner
    ports:
      - "5432:5432"